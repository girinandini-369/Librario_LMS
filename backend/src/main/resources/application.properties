spring.application.name=librario-backend

# Database Configuration
# Uses environment variables in production, falls back to local values for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/librario?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Girinandini$}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
# Uses environment variable in production, falls back to local secret for development
librario.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
librario.jwt.expiration=86400000

# Security Configuration
logging.level.org.springframework.security=DEBUG
