services:
  # 1. The Backend (Spring Boot)
  - type: web
    name: librario-backend
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # You will paste your MySQL URL here in the Render Dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # 2. The Frontend (React)
  - type: web
    name: librario-frontend
    env: static
    plan: free
    publishDir: frontend/dist
    buildCommand: cd frontend && npm install && npm run build
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: librario-backend
          property: host
